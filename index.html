<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sua Marca Aqui - Demonstração</title>

<link rel="icon" href="https://placehold.co/50x50/111/FFF?text=Icon">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="header-mobile">
  <img src="https://placehold.co/150x50/111/FFF?text=Sua+Logo" alt="Logo da Marca">

  <nav>
    <a href="index.html" class="ativo">Início</a>
    <a href="sobre.html">Sobre</a>
    <a href="catalogo.html">Catálogo</a>
  </nav>

  <button id="cart-btn" class="cart-modern">
    <i class="fa fa-shopping-cart"></i>
    <span id="cart-count">0</span>
  </button>
</header>

<main>

<section class="banner">
  <img src="https://placehold.co/1200x250/222/FFF?text=Seu+Banner+Aqui" alt="Banner Principal">
</section>

<h2 class="titulo">Produtos Em Destaque</h2>

<section id="produtos" class="grid"></section>

<h2 class="titulo">📍 Nossa Localização</h2>

<section class="mapa">
  <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3657.1973618361286!2d-46.65649468502223!3d-23.56133798468249!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94ce59c8da0aa315%3A0xd59f9431f2c9776a!2sAv.%20Paulista%2C%20S%C3%A3o%20Paulo%20-%20SP!5e0!3m2!1spt-BR!2sbr!4v1680000000000!5m2!1spt-BR!2sbr" loading="lazy"></iframe>
</section>

</main>

<footer>
  <div class="footer-left">© [Seu Nome Aqui] 2026</div>

  <div class="footer-center hide-mobile">
    Sáb: 10h–00h | Dom: 10:30–17h | Seg: Fechado<br>
    Ter–Qui: 10h–22h | Sex: 10h–00h
  </div>

  <div class="footer-right">
    <a href="#"><i class="fab fa-whatsapp"></i></a>
    <a href="#"><i class="fab fa-instagram"></i></a>
    <a href="#"><i class="fab fa-facebook"></i></a>
  </div>
</footer>

<div id="overlay"></div>

<div id="cart">
  <div class="cart-header">
    <h3>Seu Pedido</h3>
    <button id="close-cart">✖</button>
  </div>

  <ul id="cart-items"></ul>
  <h3 id="total">Total: R$ 0</h3>

  <div class="form">
    <input id="nome" placeholder="Seu nome">
    <select id="pagamento">
      <option>Pix</option>
      <option>Dinheiro</option>
      <option>Cartão</option>
    </select>
    <input id="horario" placeholder="Horário retirada">
  </div>

  <button class="btn-finalizar" onclick="finalizar()">Finalizar Pedido</button>
</div>

<script src="script.js"></script>
</body>
</html>
